<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Page Merger - Fast Merge</title>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root { --primary: #2563eb; --danger: #ef4444; --gray: #64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      padding: 20px;
      color: #1e2937;
    }
    .container { max-width: 1250px; margin: 0 auto; }
    h1 { color: var(--primary); text-align:center; margin-bottom:10px; }
    .subtitle { text-align:center; color:#64748b; margin-bottom:30px; }
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }
    .preview-panel, .files-panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
    }
    .preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
      max-height: 620px;
      overflow-y: auto;
      padding: 10px;
      background: #f8fafc;
      border-radius: 12px;
    }
    .preview-page {
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .preview-page img { width: 100%; height: auto; display: block; }
    .page-number {
      padding: 6px 8px;
      background: #f1f5f9;
      text-align: center;
      font-weight: 700;
      color: var(--primary);
      font-size: 13px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .page-input {
      width: 220px;
      padding: 10px 12px;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-merge {
      background:var(--primary);
      color:white;
      font-size:1.15rem;
      width: 100%;
      padding: 18px;
      margin: 25px 0 15px 0;
      border-radius: 12px;
    }
    .btn-preview {
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .btn-preview:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .status {
      padding:16px;
      margin:15px 0;
      border-radius:10px;
      font-weight:500;
    }
    .success { background:#dcfce7; color:#166534; }
    .error { background:#fee2e2; color:#991b1b; }
    .loading { background:#fef3c7; color:#854d0e; }
    .progress-bar {
      height: 8px;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 PDF Page Merger</h1>
    <p class="subtitle">Select pages from multiple PDFs and merge them</p>

    <div class="upload-area" id="uploadArea" style="border: 3px dashed #94a3b8; border-radius:16px; padding:60px; text-align:center; background:white; cursor:pointer; margin:20px 0;">
      <h3>📂 Drop your PDFs here (up to 50)</h3>
      <input type="file" id="fileInput" multiple accept=".pdf" style="display:none;">
      <button onclick="document.getElementById('fileInput').click()" style="margin-top:15px;background:#2563eb;color:white;padding:14px 32px;">Select PDFs</button>
    </div>

    <div id="mainContent" class="main-layout" style="display:none;">
     
      <!-- Left: Preview Panel -->
      <div class="preview-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3>📄 Live Preview (Selected Pages)</h3>
          <button onclick="updatePreview()" class="btn-preview" id="previewBtn">
            🔄 Generate Preview
          </button>
        </div>
        <div id="previewContainer" class="preview-container"></div>
      </div>

      <!-- Right: Files -->
      <div class="files-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
          <h3>📋 Files (<span id="fileCount">0</span>)</h3>
          <button onclick="clearAll()" style="background:#ef4444;color:white;">Clear All</button>
        </div>
       
        <div id="filesList"></div>
        <button onclick="mergePDFs()" class="btn-merge" id="mergeBtn">🔄 Merge All Selected Pages</button>
        <div id="status" class="status" style="display:none;"></div>
        <div id="progressContainer" style="display:none;">
          <div style="font-size:14px;margin-bottom:6px;" id="progressText">Merging...</div>
          <div style="background:#e2e8f0;border-radius:4px;height:8px;"><div id="progressBar" class="progress-bar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let filesData = [];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    // Drag & Drop
    uploadArea.addEventListener('dragover', e => { 
      e.preventDefault(); 
      uploadArea.style.borderColor = '#2563eb'; 
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#94a3b8');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.borderColor = '#94a3b8';
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(newFiles) {
      for (let file of newFiles) {
        if (file.type === 'application/pdf' && !filesData.some(f => f.name === file.name)) {
          filesData.push({ file, name: file.name, selectedPages: '' });
        }
      }
      renderFiles();
      document.getElementById('mainContent').style.display = 'grid';
      // Clear preview when new files are added
      document.getElementById('previewContainer').innerHTML = `
        <p style="grid-column:1/-1;text-align:center;color:#64748b;padding:40px;">
          Click "Generate Preview" after entering page numbers
        </p>`;
    }

    function renderFiles() {
      const list = document.getElementById('filesList');
      const count = document.getElementById('fileCount');
      list.innerHTML = '';
      count.textContent = filesData.length;

      filesData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <div style="flex:1; min-width:0;">
            <strong style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</strong>
            <small style="color:#64748b;">${(item.file.size/1024/1024).toFixed(2)} MB</small>
          </div>
          <input type="text" class="page-input"
                 placeholder="e.g. 5-10, 1-5,12"
                 value="${item.selectedPages}"
                 onkeyup="filesData[${i}].selectedPages = this.value.trim()">
          <button onclick="removeFile(${i})" style="background:#ef4444;color:white;width:38px;height:38px;border-radius:50%;font-size:18px;">×</button>
        `;
        list.appendChild(div);
      });
    }

    function removeFile(i) {
      filesData.splice(i, 1);
      if (filesData.length === 0) {
        document.getElementById('mainContent').style.display = 'none';
      } else {
        renderFiles();
      }
    }

    function clearAll() {
      if (confirm("Clear everything?")) {
        filesData = [];
        document.getElementById('mainContent').style.display = 'none';
      }
    }

    // ====================== MANUAL PREVIEW ======================
    async function updatePreview() {
      const btn = document.getElementById('previewBtn');
      const container = document.getElementById('previewContainer');
      
      btn.disabled = true;
      btn.textContent = "⏳ Generating...";
      container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#64748b;">Generating previews... Please wait</div>`;

      const allPreviews = [];

      for (let item of filesData) {
        const previews = await generateFilePreviews(item);
        allPreviews.push(...previews);
      }

      container.innerHTML = '';

      if (allPreviews.length === 0) {
        container.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#64748b;padding:40px;">
          No pages selected yet.<br>Enter page numbers (e.g. 1-5, 8, 12) and click Generate Preview.
        </p>`;
      } else {
        allPreviews.forEach(el => container.appendChild(el));
      }

      btn.disabled = false;
      btn.textContent = "🔄 Generate Preview";
    }

    async function generateFilePreviews(item) {
      const previews = [];
      try {
        const arrayBuffer = await item.file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const total = pdf.numPages;

        let pageNumbers = [];
        if (!item.selectedPages || item.selectedPages.trim() === '') {
          pageNumbers = Array.from({length: Math.min(6, total)}, (_, i) => i+1);
        } else {
          const parts = item.selectedPages.split(',').map(p => p.trim()).filter(Boolean);
          for (let part of parts) {
            if (part.includes('-')) {
              const [s, e] = part.split('-').map(n => parseInt(n));
              const start = Math.max(1, s || 1);
              const end = Math.min(total, e || total);
              for (let p = start; p <= end; p++) pageNumbers.push(p);
            } else {
              const p = parseInt(part);
              if (p >= 1 && p <= total) pageNumbers.push(p);
            }
          }
          pageNumbers = [...new Set(pageNumbers)].sort((a,b)=>a-b);
        }

        // Limit to 10 pages per file for performance
        for (let pageNum of pageNumbers.slice(0, 10)) {
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: 0.6 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

          const div = document.createElement('div');
          div.className = 'preview-page';
          div.innerHTML = `
            <img src="${canvas.toDataURL('image/jpeg', 0.8)}">
            <div class="page-number">Page ${pageNum}</div>
            <small style="display:block;text-align:center;color:#64748b;padding:3px;">${item.name.substring(0,15)}...</small>
          `;
          previews.push(div);
        }
      } catch(e) {
        console.error("Preview error for", item.name, e);
      }
      return previews;
    }

    // ==================== MERGE ====================
    async function mergePDFs() {
      if (filesData.length === 0) return showStatus("Add at least one PDF", "error");

      const status = document.getElementById('status');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const mergeBtn = document.getElementById('mergeBtn');

      mergeBtn.disabled = true;
      progressContainer.style.display = 'block';
      status.style.display = 'none';

      try {
        const { PDFDocument } = PDFLib;
        const mergedPdf = await PDFDocument.create();

        for (let i = 0; i < filesData.length; i++) {
          const item = filesData[i];
          const percent = Math.round(((i) / filesData.length) * 100);
          progressBar.style.width = percent + '%';
          progressText.textContent = `Merging file ${i+1}/${filesData.length}: ${item.name.substring(0,25)}...`;

          const arrayBuffer = await item.file.arrayBuffer();
          const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
          const totalPages = pdfDoc.getPageCount();

          let pagesToCopy = [];
          if (!item.selectedPages || item.selectedPages.trim() === '') {
            pagesToCopy = Array.from({length: totalPages}, (_, idx) => idx);
          } else {
            const parts = item.selectedPages.split(',').map(p => p.trim()).filter(p => p);
            for (let part of parts) {
              if (part.includes('-')) {
                const range = part.split('-').map(n => parseInt(n.trim()));
                const start = Math.max(1, range[0] || 1);
                const end = Math.min(totalPages, range[1] || totalPages);
                for (let p = start; p <= end; p++) pagesToCopy.push(p - 1);
              } else {
                const p = parseInt(part.trim());
                if (!isNaN(p) && p >= 1 && p <= totalPages) pagesToCopy.push(p - 1);
              }
            }
            pagesToCopy = [...new Set(pagesToCopy)].sort((a, b) => a - b);
          }

          if (pagesToCopy.length > 0) {
            const copied = await mergedPdf.copyPages(pdfDoc, pagesToCopy);
            copied.forEach(page => mergedPdf.addPage(page));
          }

          if (i < filesData.length - 1) await new Promise(r => setTimeout(r, 50));
        }

        progressBar.style.width = '100%';
        progressText.textContent = "Saving final PDF...";

        const pdfBytes = await mergedPdf.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Merged-PDF-${new Date().toISOString().slice(0,10)}.pdf`;
        a.click();
        URL.revokeObjectURL(url);

        showStatus("✅ Merge completed successfully! Download started.", "success");
      } catch (err) {
        console.error(err);
        showStatus("❌ Error during merge: " + err.message, "error");
      } finally {
        mergeBtn.disabled = false;
        setTimeout(() => {
          progressContainer.style.display = 'none';
          progressBar.style.width = '0%';
        }, 2000);
      }
    }

    function showStatus(msg, type) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = "block";
    }
  </script>
</body>
</html>
